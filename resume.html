<!DOCTYPE html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>陳姵辰的履歷</title>
  <style>
    body {
      font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
      margin: 0;
      background: #f4f7f6;
      color: #333;
    }

    .container {
      display: flex;
      max-width: 1000px;
      margin: 40px auto;
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    /* 左側主要內容 */
    .main-content {
      width: 65%;
      padding: 40px;
    }

    /* 右側側邊欄 */
    .sidebar {
      width: 35%;
      background: #1f4d4f;
      color: white;
      padding: 40px;
      text-align: center;
    }

    /* 個人照片 */
    .profile-img {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 5px solid rgba(255,255,255,0.2);
      margin-bottom: 20px;
      object-fit: cover;
    }

    h1 { margin: 10px 0; font-size: 28px; }
    h2 { font-size: 18px; border-left: 4px solid #1f4d4f; padding-left: 10px; margin-bottom: 20px; }
    
    .sidebar h2 { border-left: 4px solid #fff; color: #fff; margin-top: 30px; }

    /* 技能進度條 */
    .skill-container { margin-bottom: 15px; }
    .skill-bar {
      background: #eee;
      height: 10px;
      border-radius: 5px;
      margin-top: 5px;
    }
    .skill-per {
      height: 10px;
      background: #1f4d4f;
      border-radius: 5px;
      position: relative;
    }

    /* 作品展示區 */
    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 15px;
    }
    .portfolio-item {
      background: #eee;
      height: 120px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #777;
      border: 1px dashed #ccc;
    }

    /* 播放器樣式 */
    audio { width: 100%; margin-top: 10px; }

    .btn-action {
      background: #1f4d4f;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    .btn-action:hover { background: #357a7d; }

    @media (max-width: 768px) {
      .container { flex-direction: column; }
      .main-content, .sidebar { width: 100%; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="sidebar">
    <img src="images/photo.jpg" alt="陳姵辰" class="profile-img">
    <h1>陳姵辰</h1>

  </div>

    </div>

    </div>

    <div class="section">
      <h2>專業與核心技能</h2>
      <div class="skill-container">
        <span>手工編織</span>
        <div class="skill-bar"><div class="skill-per" style="width: 85%;"></div></div>
      </div>
      <div class="skill-container">
        <span>鋼琴演奏</span>
        <div class="skill-bar"><div class="skill-per" style="width: 75%;"></div></div>

        <div class="skill-bar"><div class="skill-per" style="width: 60%;"></div></div>
      </div>
    </div>


<script>
function changeIntro() {
  const texts = [
    "我是一位大學生，喜歡在無聊的時候畫畫打發時間，編織一些小物也是我的日常。",
    "音樂與藝術是我生活的調劑，我享受在鋼琴旋律中尋找靈感的時刻。",
    "專注於聽語專業的學習，同時不斷挑戰手工藝的無限可能。"
  ];

</body>
</html>
