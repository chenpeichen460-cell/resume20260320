<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的履歷</title>
  <style>
 body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #eaeaea;
}

/* 整體版面 */
.container {
  display: flex;
  max-width: 1000px;
  margin: 40px auto;
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

/* 左側 */
.container > div:first-child {
  width: 60%;
  padding: 30px;
}

/* 右側（自動抓 header + 其他區塊） */
.container > div:last-child {
  width: 40%;
  background: #1f4d4f;
  color: white;
  padding: 30px;
}

/* 頭像 */
.header {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.header img {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  border: 5px solid white;
  margin-bottom: 10px;
}

/* 名字 */
h1 {
  margin: 10px 0 5px;
}

/* 區塊 */
.section {
  margin-top: 25px;
}

/* 標題樣式 */
.section h2 {
  display: inline-block;
  padding: 5px 15px;
  border-radius: 20px;
  background: #1f4d4f;
  color: white;
  font-size: 16px;
}

/* 右側標題 */
.container > div:last-child .section h2 {
  background: white;
  color: #1f4d4f;
}

/* 清單 */
ul {
  padding-left: 20px;
}

/* 按鈕 */
button {
  margin-top: 10px;
  padding: 8px 16px;
  border: none;
  background: #1f4d4f;
  color: white;
  border-radius: 20px;
  cursor: pointer;
}

button:hover {
  background: #16393b;
}

/* 技能條（自動套用） */
ul li {
  margin-bottom: 8px;
}

/* 手機版 */
@media (max-width: 768px) {
  .container {
    flex-direction: column;
  }

  .container > div {
    width: 100% !important;
  }
}
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <!-- 照片放在 images 資料夾 -->
    <img src="images/photo.jpg" alt="個人照片">
    <div>
      <h1>你的名字</h1>
      <p>電子郵件：example@email.com</p>
      <p>電話：0912-345-678</p>
    </div>
  </div>

  <div class="section">
    <h2>自我介紹</h2>
    <p id="intro">我是一位大學生，對科技與學習充滿熱情。</p>
    <button onclick="changeIntro()">換一句自我介紹</button>
  </div>

  <div class="section">
    <h2>學歷</h2>
    <ul>
      <li>某某大學 - 某某系</li>
    </ul>
  </div>

  <div class="section">
    <h2>技能</h2>
    <ul>
      <li>HTML / CSS / JavaScript</li>
      <li>Python</li>
      <li>資料分析</li>
    </ul>
  </div>

  <div class="section">
    <h2>專案經驗</h2>
    <ul>
      <li>個人網站製作</li>
      <li>資料分析專題</li>
    </ul>
  </div>
</div>

<script>
function changeIntro() {
  const texts = [
    "我是一位大學生，對科技與學習充滿熱情。",
    "喜歡挑戰新事物，持續提升自己的能力。",
    "對前端開發與設計有高度興趣。"
  ];

  const random = Math.floor(Math.random() * texts.length);
  document.getElementById("intro").innerText = texts[random];
}
</script>

</body>
</html>
