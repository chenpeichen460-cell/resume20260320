<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的履歷</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .header img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 50%;
    }

    h1 {
      margin: 0;
    }

    .section {
      margin-top: 30px;
    }

    .section h2 {
      border-bottom: 2px solid #ddd;
      padding-bottom: 5px;
    }

    ul {
      padding-left: 20px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <!-- 照片放在 images 資料夾 -->
    <img src="images/photo.jpg" alt="個人照片">
    <div>
      <h1>你的名字</h1>
      <p>電子郵件：example@email.com</p>
      <p>電話：0912-345-678</p>
    </div>
  </div>

  <div class="section">
    <h2>自我介紹</h2>
    <p id="intro">我是一位大學生，對科技與學習充滿熱情。</p>
    <button onclick="changeIntro()">換一句自我介紹</button>
  </div>

  <div class="section">
    <h2>學歷</h2>
    <ul>
      <li>某某大學 - 某某系</li>
    </ul>
  </div>

  <div class="section">
    <h2>技能</h2>
    <ul>
      <li>HTML / CSS / JavaScript</li>
      <li>Python</li>
      <li>資料分析</li>
    </ul>
  </div>

  <div class="section">
    <h2>專案經驗</h2>
    <ul>
      <li>個人網站製作</li>
      <li>資料分析專題</li>
    </ul>
  </div>
</div>

<script>
function changeIntro() {
  const texts = [
    "我是一位大學生，對科技與學習充滿熱情。",
    "喜歡挑戰新事物，持續提升自己的能力。",
    "對前端開發與設計有高度興趣。"
  ];

  const random = Math.floor(Math.random() * texts.length);
  document.getElementById("intro").innerText = texts[random];
}
</script>

</body>
</html>
